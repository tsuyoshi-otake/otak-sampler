appId: dev.otake.otak-sampler
productName: otak-sampler
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
asarUnpack:
  # ORT WASM runtime needs to be on the real filesystem because the renderer
  # loads it via dynamic ES module import + a proxy Worker, both of which fail
  # against the virtual asar archive in production.
  - out/renderer/ort/**
win:
  target: nsis
  artifactName: otak-sampler-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: otak-sampler
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  installerLanguages:
    - en_US
    - ja_JP
publish:
  provider: github
  owner: tsuyoshi-otake
  repo: otak-sampler
